services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: adis_backend
    ports:
      - "8000:8000"
    # Mount ONLY your source code, not the whole app folder
    volumes:
      - ./backend:/app/app
    environment:
      DATABASE_URL: postgresql://user:password@db:5432/adis_phas
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/docs"]
      interval: 10s
      timeout: 5s
      retries: 3

  ui:
    build:
      context: ./ui
      dockerfile: Dockerfile
    container_name: adis_ui
    ports:
      - "8501:8501"
    volumes:
      - ./ui:/app/app
    environment:
      BACKEND_URL: http://backend:8000
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8501"]
      interval: 10s
      timeout: 5s
      retries: 3

  db:
    image: postgres:15
    container_name: adis_db
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: adis_phas
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d adis_phas"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
